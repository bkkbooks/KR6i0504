body:
  text: 宋居士沮渠京聲譯聞如是一時佛遊舍衛祇樹之園須達精舍大賢衆千二百五十人佛告諸比丘有四雅行智者常遵丈夫所修達士恆奉不才愚夫所不好樂何等為四孝事父母悅色養足守仁行慈終始不殺惠施濟乏未曾吝逆遭值聖世捐榮履道是四雅行智者所遵丈夫所修達士所奉不才愚夫所不好樂佛時頌曰智者稱孝愍命慈活放施普給超俗崇寂如是正業明士所習聖見已具定至無為佛告比丘復有二法若在間宴或處大衆心行莫懈一者靜寂賢聖默定二者博學講論邃義又有二施飲食美味以安身命敷散經典開微悅聽食施安身法施遷神一事雖快法施為最是以比丘念演妙法宣慧莫癡既自洗濯并淨塵著如是道法永度無窮乃名出家具足覺了佛説經竟比丘歡喜作禮受教
